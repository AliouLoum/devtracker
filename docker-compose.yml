services:
  postgres:
    image: postgres:16-alpine
    container_name: devtracker-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devtracker}
      POSTGRES_DB: ${POSTGRES_DB:-devtracker}
    volumes:
      - devtracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devtracker} -d ${POSTGRES_DB:-devtracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devtracker-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  mailhog:
    image: mailhog/mailhog
    container_name: devtracker-mail
    ports:
      - "1025:1025"   # SMTP local pour les emails en dev
      - "8025:8025"   # Interface web pour voir les emails reçus
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: devtracker-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  devtracker_pgdata:
